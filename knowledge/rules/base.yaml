# Rules per gli intent del chatbot Arianna
# Formato DSL dichiarativo - Runtime interpreterà queste regole

rules:
  # ========================================
  # Intent semplici (solo default response)
  # ========================================

  compliment:
    default: compliment_response

  insult:
    default: insult_response

  bot_challenge:
    default: bot_challenge_response

  mood_great:
    default: mood_great_response

  mood_unhappy:
    default: mood_unhappy_response

  joke:
    default: joke_response

  weather_query:
    default: weather_query_response

  time_query:
    default: time_query_response

  date_query:
    default: date_query_response

  low_confidence_fallback:
    default: low_confidence_fallback_response

  # ========================================
  # Intent con slot: ask_city_touristic_information
  # ========================================

  ask_city_touristic_information:
    slots:
      LOCATION:
        required: true
        type: string
        entity: LOCATION

    cases:
      Roma: ask_city_touristic_information_roma_response
      Milano: ask_city_touristic_information_milano_response

    fallback: ask_location_unsupported_response
    wait: ask_location_wait_response

  # ========================================
  # Intent con slot: open_app
  # ========================================

  open_app:
    slots:
      PRODUCT:
        required: true
        type: string
        entity: PRODUCT

    cases:
      WhatsApp: open_app_whatsapp_response
      Telegram: open_app_telegram_response
      Spotify: open_app_spotify_response
      Chrome: open_app_chrome_response

    fallback: open_app_unsupported_response
    wait: open_app_wait_response

  # ========================================
  # Intent con slot opzionale: introduce_user
  # ========================================

  introduce_user:
    slots:
      PERSON:
        required: true
        type: string
        entity: PERSON

    default: introduce_user_response
    wait: introduce_user_wait_response

  # ========================================
  # Esempio: Bot imposta slot via set_slots (confirm)
  # ========================================

  confirm_roma:
    default: confirmed_roma_response
    set_slots:
      LOCATION: "Roma"
      CONFIRMATION: true

  # ========================================
  # Esempio: Bot imposta slot via risposta inline
  # ========================================

  inline_slot_example:
    default: inline_slot_example_response

  # ========================================
  # Operations (prefisso __)
  # ========================================

  calculate:
    default: __calculate

  location_query:
    default: __location_query

  web_search:
    slots:
      query:
        required: true
        type: string
        entity: QUERY

    default: __web_search
    wait: web_search_wait_response

