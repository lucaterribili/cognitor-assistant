# Command rules - Intent per comandi e azioni

rules:
  restaurant_booking:
    default: restaurant_booking_response

  order_food:
    default: order_food_response

  taxi_ride:
    default: taxi_ride_response

  book_flight:
    default: book_flight_response

  book_hotel:
    default: book_hotel_response

  generic_booking:
    wait: generic_booking_ask_type
    default: generic_booking_response
    slots:
      tipo_prenotazione:
        required: true
    cases:
      ristorante:
        restaurant_booking_response
      hotel:
        book_hotel_response
      volo:
        book_flight_response
      taxi:
        taxi_ride_response

  alarm_set:
    default: alarm_set_response

  play_music:
    default: play_music_response

  read_news:
    default: read_news_response

  schedule_meeting:
    default: schedule_meeting_response

  send_email:
    default: send_email_response

