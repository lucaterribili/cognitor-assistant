version: "3.1"

nlu:

- intent: weather_query
  examples: |
    - che tempo fa oggi?
    - qual è il meteo attuale?
    - pioverà oggi?
    - mi puoi dire il meteo?

- intent: location_query
  examples: |
    - dove sono?
    - dove mi trovo?
    - mi puoi dire la mia posizione?

- intent: perform_math_operation
  examples: |
    - Aggiungi [12](mathNumber2) a [8](mathNumber2)
    - Somma [3](mathNumber2) con [14](mathNumber2)
    - Sottrai [75](mathNumber2) da [100](mathNumber2)
    - Moltiplica [9](mathNumber2) per [4](mathNumber2)
    - Quanto fa [25](mathNumber2) meno [5](mathNumber2)?
    - Dividi [144](mathNumber2) per [12](mathNumber2)
    - Quanto fa [30](mathNumber2) diviso [5](mathNumber2)?
    - Quanto è il prodotto di [6](mathNumber2) e [7](mathNumber2)?
    - Qual è la differenza tra [80](mathNumber2) e [30](mathNumber2)?
    - Qual è il quoziente di [49](mathNumber2) e [7](mathNumber2)?
    - Somma [24](mathNumber2) e [16](mathNumber2)
    - Togli [10](mathNumber2) a [50](mathNumber2)
    - Aggiungi [100](mathNumber2) con [25](mathNumber2)
    - Moltiplica [7](mathNumber2) e [8](mathNumber2)
    - Dividi [90](mathNumber2) e [10](mathNumber2)

- intent: calculate
  examples: |
    - Qual è il risultato di 5 + 3?
    - Calcola 12 - 4
    - 7 * 6
    - 15 / 3
    - Trova il risultato di 9 + 8
    - Quanto fa 20 - 10?
    - Risolvi 3 + 7
    - Che cosa dà 8 * 5?
    - Cosa otteniamo da 18 / 2?
    - Fai il calcolo di 25 + 15
    - Esegui 40 - 25
    - Qual è 6 * 9?
    - Calcola 100 / 4
    - Trova 13 + 7
    - Quanto è 50 - 30?
    - Che risultato dà 5 + 9?
    - Risolvimi 16 / 4
    - Qual è il risultato di 3 * 3?
    - Fai il calcolo di 27 - 9
    - Quanto fa 14 + 6?
    - Cosa si ottiene da 24 / 8?

- intent: time_query
  examples: |
    - che ore sono?
    - puoi dirmi l'orario?
    - quale è l'ora attuale?

- intent: date_query
  examples: |
    - che giorno è oggi?
    - quale è la data di oggi?
    - mi puoi dire la data?

- intent: year_query
  examples: |
    - in che anno siamo?
    - quale anno è adesso?
    - che anno è?     
