version: "3.1"

nlu:

- intent: ask_favorite_color
  examples: |
    - Qual è il tuo colore preferito?
    - Capisco, ma se dovessi scegliere un colore per me, quale sceglieresti e perché?
    - Hai un colore che ti piace più di altri?
    - Se dovessi scegliere un colore per una stanza, quale suggeriresti?
    - Puoi dirmi quale colore preferisci?
    - Mi interessa sapere quale sia il tuo colore preferito.
    - C'è un colore che ti piace più degli altri?
    - Se dovessi decidere un colore per me, quale sarebbe?
    - Quale colore ti rappresenta meglio?
    - Se avessi una tavolozza di colori, quale sceglieresti per me?

